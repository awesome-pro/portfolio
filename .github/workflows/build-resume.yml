name: Build resume PDF

on:
  push:
    paths:
      - data/resume.tex
      - scripts/build-resume.sh
      - .github/workflows/build-resume.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF from LaTeX
        run: bash scripts/build-resume.sh

      - name: Commit generated PDF
        run: |
          if [ -z "$(git status --porcelain -- public/resume.pdf)" ]; then
            echo "public/resume.pdf is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          git commit -m "chore: update resume pdf"
          git push
