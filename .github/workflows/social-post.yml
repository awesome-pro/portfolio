name: Social Post Automation

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST (UTC+5:30)
  workflow_dispatch:        # manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # kill the job if it hangs (web search + generation <= 3 min in practice)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic httpx xdk

      - name: Generate and publish posts
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          LI_ACCESS_TOKEN:       ${{ secrets.LI_ACCESS_TOKEN }}
          LI_PERSON_URN:         ${{ secrets.LI_PERSON_URN }}
          X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/social_post.py
