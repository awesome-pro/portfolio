<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Orchflow architecture</title>
  <desc id="desc">A compact diagram showing Orchflow running sequential, parallel, conditional, human review, checkpoint, and structured agent workflow features.</desc>
  <rect width="1200" height="675" rx="28" fill="#0B1020"/>
  <rect x="32" y="32" width="1136" height="611" rx="22" fill="#101827" stroke="#243044" stroke-width="2"/>
  <text x="76" y="98" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="800">Orchflow</text>
  <text x="76" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">Readable multi-agent pipelines for Python</text>

  <g filter="url(#shadow)">
    <rect x="76" y="191" width="194" height="108" rx="16" fill="#162033" stroke="#334155"/>
    <text x="106" y="234" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">@step</text>
    <text x="106" y="268" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="16">normal Python</text>

    <rect x="358" y="145" width="224" height="92" rx="16" fill="#123044" stroke="#0EA5E9"/>
    <text x="392" y="182" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="700">parallel work</text>
    <text x="392" y="211" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="15">flat traces</text>

    <rect x="358" y="269" width="224" height="92" rx="16" fill="#2A1E3F" stroke="#A855F7"/>
    <text x="392" y="306" fill="#F3E8FF" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="700">condition</text>
    <text x="392" y="335" fill="#D8B4FE" font-family="Inter, ui-sans-serif, system-ui" font-size="15">route by context</text>

    <rect x="664" y="191" width="214" height="108" rx="16" fill="#132E26" stroke="#10B981"/>
    <text x="696" y="234" fill="#D1FAE5" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">FlowResult</text>
    <text x="696" y="268" fill="#A7F3D0" font-family="Inter, ui-sans-serif, system-ui" font-size="16">output + state</text>
  </g>

  <path d="M270 245H338" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M338 191H358" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M338 315H358" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M582 191H632C649.673 191 664 205.327 664 223V245" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M582 315H632C649.673 315 664 300.673 664 283V245" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M878 245H950" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="950" y="172" width="178" height="146" rx="18" fill="#231F16" stroke="#F59E0B"/>
    <text x="984" y="217" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="700">Agent</text>
    <text x="984" y="249" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="15">LiteLLM optional</text>
    <text x="984" y="276" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui" font-size="15">structured JSON</text>
  </g>

  <g>
    <rect x="76" y="430" width="232" height="82" rx="14" fill="#111A2B" stroke="#334155"/>
    <circle cx="112" cy="471" r="13" fill="#38BDF8"/>
    <text x="140" y="464" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Events</text>
    <text x="140" y="490" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">live lifecycle stream</text>

    <rect x="340" y="430" width="232" height="82" rx="14" fill="#111A2B" stroke="#334155"/>
    <circle cx="376" cy="471" r="13" fill="#A78BFA"/>
    <text x="404" y="464" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Human gates</text>
    <text x="404" y="490" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">stdin or provider callback</text>

    <rect x="604" y="430" width="232" height="82" rx="14" fill="#111A2B" stroke="#334155"/>
    <circle cx="640" cy="471" r="13" fill="#34D399"/>
    <text x="668" y="464" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">Checkpoints</text>
    <text x="668" y="490" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">JSON resume points</text>

    <rect x="868" y="430" width="260" height="82" rx="14" fill="#111A2B" stroke="#334155"/>
    <circle cx="904" cy="471" r="13" fill="#F59E0B"/>
    <text x="932" y="464" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700">CI/CD</text>
    <text x="932" y="490" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">PyPI releases from tags</text>
  </g>

  <rect x="76" y="564" width="214" height="40" rx="20" fill="#0F766E"/>
  <text x="102" y="590" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Published on PyPI</text>
  <rect x="314" y="564" width="166" height="40" rx="20" fill="#1D4ED8"/>
  <text x="342" y="590" fill="#DBEAFE" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">v0.5.0</text>
  <rect x="504" y="564" width="256" height="40" rx="20" fill="#7C2D12"/>
  <text x="532" y="590" fill="#FFEDD5" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Python 3.11+ typed API</text>

  <defs>
    <filter id="shadow" x="56" y="125" width="1092" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
</svg>
